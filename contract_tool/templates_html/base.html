<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Контракт-генератор{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f1ea;
      --bg-card: #fffdf8;
      --ink: #1d1b18;
      --ink-soft: #5a564f;
      --ink-mute: #8a857c;
      --accent: #b54a2c;
      --accent-soft: #e8d4cc;
      --line: #d6cfc1;
      --green: #4a6d4f;
      --warning: #b8862a;
      --shadow: 0 1px 2px rgba(29, 27, 24, .04), 0 8px 24px rgba(29, 27, 24, .06);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.55;
      min-height: 100vh;
    }
    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 48px 32px 80px;
    }
    .top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 56px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }
    .brand {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 600;
      font-size: 22px;
      letter-spacing: -0.01em;
    }
    .brand .dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      margin-right: 10px;
      transform: translateY(-3px);
    }
    .crumbs {
      font-size: 13px;
      color: var(--ink-mute);
    }
    .crumbs a { color: var(--ink-soft); text-decoration: none; }
    .crumbs a:hover { color: var(--accent); }

    h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 500;
      font-size: 44px;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin: 0 0 12px;
    }
    h2 {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 500;
      font-size: 24px;
      letter-spacing: -0.01em;
      margin: 32px 0 16px;
    }
    .lede {
      font-size: 17px;
      color: var(--ink-soft);
      max-width: 600px;
      margin-bottom: 40px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 28px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }
    .card h3 {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 20px;
      margin: 0 0 6px;
    }
    .card p { margin: 0; color: var(--ink-soft); font-size: 14px; }
    a.template-link {
      display: block;
      text-decoration: none;
      color: inherit;
      transition: transform .15s, box-shadow .15s;
    }
    a.template-link:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 4px rgba(29,27,24,.06), 0 12px 32px rgba(29,27,24,.08);
    }
    a.template-link:hover .card { border-color: var(--accent-soft); }

    /* Form layout: two-column with section headings */
    .form-section { margin-bottom: 36px; }
    .form-section-title {
      font-family: 'Fraunces', serif;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--ink-mute);
      margin: 0 0 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--line);
    }
    .field { margin-bottom: 18px; }
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    @media (max-width: 720px) {
      .field-row { grid-template-columns: 1fr; }
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 6px;
    }
    .hint {
      font-size: 12px;
      color: var(--ink-mute);
      margin-top: 4px;
    }
    input[type="text"], textarea {
      width: 100%;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      font: inherit;
      font-size: 14px;
      color: var(--ink);
      transition: border-color .12s, box-shadow .12s;
    }
    input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(181, 74, 44, .12);
    }
    textarea { min-height: 70px; resize: vertical; font-family: inherit; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 6px;
      font: inherit;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid transparent;
      text-decoration: none;
      transition: background .12s, border-color .12s, color .12s;
    }
    .btn-primary {
      background: var(--ink);
      color: var(--bg-card);
    }
    .btn-primary:hover { background: var(--accent); }
    .btn-primary:disabled { background: var(--ink-mute); cursor: wait; }
    .btn-ghost {
      background: transparent;
      border-color: var(--line);
      color: var(--ink-soft);
    }
    .btn-ghost:hover { border-color: var(--ink-soft); color: var(--ink); }

    .actions-bar {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 20px 0;
      position: sticky;
      bottom: 0;
      background: linear-gradient(to top, var(--bg) 60%, rgba(244, 241, 234, 0));
      backdrop-filter: blur(4px);
      margin: 24px -32px -80px;
      padding: 24px 32px 32px;
    }

    /* Paste-area for AI/regex parser */
    .paste-area {
      background: #f8f5ee;
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 24px;
    }
    .paste-area textarea {
      background: #fffdf8;
      min-height: 90px;
    }
    .paste-area .row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }
    .paste-area .label {
      font-family: 'Fraunces', serif;
      font-size: 16px;
      font-weight: 500;
    }
    .paste-area .desc {
      font-size: 12px;
      color: var(--ink-mute);
    }
    .parse-btn { margin-top: 10px; }
    .parse-status {
      font-size: 12px;
      color: var(--green);
      margin-left: 10px;
    }
    .parse-status.warn { color: var(--warning); }
    .parse-status.err { color: var(--accent); }

    /* Preview */
    .preview-pane {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 32px;
      max-height: 70vh;
      overflow-y: auto;
      font-family: 'Times New Roman', Times, serif;
      font-size: 13px;
      line-height: 1.4;
    }
    .preview-pane table { border-collapse: collapse; margin: 8px 0; }
    .preview-pane td, .preview-pane th { border: 1px solid #888; padding: 4px 6px; vertical-align: top; }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(29, 27, 24, .55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 24px;
    }
    .modal.open { display: flex; }
    .modal-inner {
      background: var(--bg-card);
      border-radius: 12px;
      max-width: 1100px;
      width: 100%;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    .modal-header {
      padding: 20px 28px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h2 { margin: 0; font-size: 20px; }
    .modal-body {
      padding: 24px 28px;
      overflow-y: auto;
      flex: 1;
    }
    .modal-footer {
      padding: 16px 28px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      background: #faf7f0;
      border-radius: 0 0 12px 12px;
    }
    .modal-close {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: var(--ink-mute);
      padding: 0;
      line-height: 1;
    }

    .warnings {
      background: #fdf6e3;
      border: 1px solid #e8d585;
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 18px;
      font-size: 13px;
    }
    .warnings strong { color: var(--warning); }
    .warnings ul { margin: 6px 0 0; padding-left: 22px; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--line);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand"><span class="dot"></span>Айсистемс · Контракт-генератор</div>
      <div class="crumbs">
        {% block crumbs %}<a href="/">Шаблоны</a>{% endblock %}
      </div>
    </div>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
